<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>{% block title %}{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" type="text/css" href="{% static 'hello/site.css' %}"/>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>

<div class = "header-banner">
    {% load static %} 
    <img src="{% static 'hello/images/marble.png' %}" alt="Header Image">
</div>

<div class="navbar">

    {% if user.is_authenticated %}
        <a href = "{% url 'user_panel' %}" class="navbar-brand
        {% if request.resolver_match.url_name == 'user_panel' %}
        active
        {% endif %}">
        User Panel
        </a>

        <a href="{% url 'upload_image' %}" class="navbar-item
        {% if request.resolver_match.url_name == 'upload_image' %}
        active
        {% endif %}">
        Add Image
        </a>

        <a href="{% url 'create_mask' %}" class="navbar-item
        {% if request.resolver_match.url_name == 'create_mask' %}
        active
        {% endif %}">
        Create Mask
        </a>

        <form action="{% url 'logout' %}" method="post" class="login-form-nav">
            {% csrf_token %}
            <button type="submit" class="small-btn-login-nav">Log out</button>
        </form>

    {% else %}
        <a href="{% url 'home' %}" class="navbar-brand 
        {% if request.resolver_match.url_name == 'home' %}
        active
        {% endif %}">
        Home
        </a>
    
        <!-- czy nazwa strony na której obecnie jesteśmy jest równa tej z url_name? -->
        <a href="{% url 'about' %}" class="navbar-item 
        {% if request.resolver_match.url_name == 'about' %}
        active
        {% endif %}">
        About
        </a>

        <a href="{% url 'contact' %}" class="navbar-item 
        {% if request.resolver_match.url_name == 'contact' %}
        active{% endif %}">
        Contact
        </a>

        <form action="{% url 'login' %}" method="get" class="login-form-nav">
            <button type="submit" class="small-btn-login-nav">Log in</button>
        </form>
    {% endif %}
</div>

<div class="body-content">
    {% block content %}
    {% endblock %}
    <hr/>
    <footer type="footer" class="footer">
        <p>Aplikacje_Webowe_2026</p>
    </footer>
</div>
</body>
</html>
